name: Verify ProposalPilot Demo

on:
  push:
    branches: [main, checkpoint-0-baseline, checkpoint-1-ui-shell, checkpoint-2-working-saas-flow]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
